name: Ingest WV News content

# Re-fetches the latest stories from wvnews.com every 15 minutes and commits
# the updated JSON. Commits that only change ingested-stories.json are tagged
# with [skip ci] so they don't re-trigger CI or burn Vercel build minutes.
#
# GitHub cron is best-effort — 15-min schedules can slip under heavy load.
# If you need tighter SLAs, migrate to Vercel Cron + a database.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: ingest-content
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Ingest stories (wvnews.com RSS + section backfill)
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: wvnews-crm
        run: node scripts/ingest-wvnews.mjs

      - name: Collect Media Desk signals (RSS + Google News)
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: wvnews-crm
        run: node scripts/collect-media-signals.mjs

      - name: Commit and push if static JSON changed
        run: |
          set -euo pipefail
          git config user.name  "wvnews-ingest-bot"
          git config user.email "ingest-bot@users.noreply.github.com"

          if git diff --quiet -- src/data/ingested-stories.json; then
            echo "No content changes — nothing to commit."
            exit 0
          fi

          git add src/data/ingested-stories.json
          git commit -m "chore(content): refresh ingested stories [skip ci]

          Auto-generated by .github/workflows/ingest-content.yml
          "
          git push
